# nginx configuration for the ArtelMemory single-domain product layout.
#
# One host (artelmemory.ru), path-split across the three surfaces:
#   /                 -> marketing landing (static files, served by nginx)
#   /mcp, /healthz    -> MCP transport for agents            (loopback :8080)
#   /console          -> operator console SPA                (loopback :8081)
#   /api/admin        -> operator BFF + auth/setup           (loopback :8081)
#
# Use this INSTEAD of nginx.conf when the box hosts landing + console + MCP on a
# single apex domain (one TLS cert). nginx.conf is the MCP-only single-purpose
# variant.
#
# Operator checklist:
#   1. Replace artelmemory.ru below if your domain differs.
#   2. Drop the cert: edit ssl_certificate paths (apex cert from your host) OR
#        certbot --nginx -d artelmemory.ru
#   3. Deploy the landing:  install -d /var/www/artelmemory && \
#        cp -r /opt/shared-agents-memory/landing/* /var/www/artelmemory/
#   4. The console SPA must be BUILT for the /console base (default in
#        src/admin/web/vite.config.ts) and served by the admin listener with
#        ADMIN_ENABLED=true. nginx strips the /console prefix before :8081.
#   5. cp deploy/nginx-artelmemory.conf /etc/nginx/sites-available/artelmemory
#      ln -s /etc/nginx/sites-available/artelmemory /etc/nginx/sites-enabled/artelmemory
#      nginx -t && systemctl reload nginx

# Redirect plain HTTP to HTTPS (keep the ACME challenge reachable for certbot).
server {
    listen 80;
    listen [::]:80;
    server_name artelmemory.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name artelmemory.ru;

    # ------------------------------------------------------------------ TLS
    # Apex-only certificate (this deployment has no wildcard). Edit to your paths.
    ssl_certificate     /etc/letsencrypt/live/artelmemory.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artelmemory.ru/privkey.pem;

    # TLS 1.2 + 1.3. Do NOT drop to TLS-1.3-only: the Codex CLI's rmcp Streamable
    # HTTP client (reqwest) negotiates TLS 1.2 and fails a 1.3-only server with
    # "bad protocol version", so the MCP session never starts (curl/Claude Code
    # use 1.3 and are unaffected, masking it). Keep an explicit ssl_ciphers list
    # so TLS 1.2 has a usable suite. ssl_protocols is taken from the :443
    # default server — if other vhosts share the socket they must allow 1.2 too.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    access_log /var/log/nginx/artelmemory.access.log;

    # memory.store content is capped at 32k; 1m allows for JSON framing overhead.
    client_max_body_size 1m;

    # ------------------------------------------------------------------ Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()"      always;

    # ------------------------------------------------------------------ Block /metrics externally
    location = /metrics {
        return 404;
    }

    # ------------------------------------------------------------------ /healthz (public — uptime monitors)
    location = /healthz {
        proxy_pass         http://127.0.0.1:8080/healthz;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------ MCP endpoint (POST + SSE) -> :8080
    location /mcp {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE: never buffer, long read timeout, clear Connection.
        proxy_buffering    off;
        proxy_read_timeout 15m;
        proxy_set_header   Connection "";
    }

    # ------------------------------------------------------------------ Operator BFF + auth/setup -> :8081
    # NOT prefix-stripped — the admin listener serves these at /api/admin/*.
    location /api/admin {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------ Operator console SPA -> :8081
    # The SPA is built with base=/console (asset URLs carry the prefix). The
    # trailing slash on proxy_pass STRIPS /console/ so the admin listener — which
    # serves the SPA at its own root — sees /, /assets/*, /index.html, etc.
    location = /console { return 301 /console/; }
    location /console/ {
        proxy_pass         http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------ Marketing landing (static) -> /
    root  /var/www/artelmemory;
    index index.html;
    location / {
        try_files $uri $uri/ =404;
    }
}
