# nginx reference configuration for shared-agents-memory
#
# Operator checklist:
#   1. Replace memory.example.com with your actual domain in all three places below.
#   2. Obtain a TLS certificate:
#        certbot --nginx -d memory.example.com
#      (certbot will rewrite the ssl_certificate paths automatically)
#   3. Copy this file to /etc/nginx/sites-available/shared-agents-memory
#   4. Enable:  ln -s /etc/nginx/sites-available/shared-agents-memory \
#                        /etc/nginx/sites-enabled/shared-agents-memory
#   5. Test:    nginx -t
#   6. Reload:  systemctl reload nginx
#
# ADR-0003 §3.4 topology:
#   internet --(TLS :443)--> nginx --(loopback :8080)--> mcp container
#
# Security notes:
#   - /metrics is blocked at the proxy layer (loopback-only; use `curl http://127.0.0.1:8080/metrics`).
#   - /healthz is intentionally unblocked for external uptime monitors.
#   - HSTS, X-Content-Type-Options, Referrer-Policy, and Permissions-Policy are set.
#   - client_max_body_size 1m matches the memory.store 32k cap with headroom for JSON framing.

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name memory.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name memory.example.com;

    # ------------------------------------------------------------------ TLS
    # Paths written by certbot. Replace with your certificate paths if you
    # manage TLS outside of certbot.
    ssl_certificate     /etc/letsencrypt/live/memory.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/memory.example.com/privkey.pem;

    # Modern TLS settings (TLSv1.2 dropped; TLSv1.3-only for forward secrecy).
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ------------------------------------------------------------------ Logging
    access_log /var/log/nginx/shared-agents-memory.access.log;

    # ------------------------------------------------------------------ Request limits
    # memory.store content is capped at 32k; 1m allows for JSON framing overhead.
    client_max_body_size 1m;

    # ------------------------------------------------------------------ Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()"      always;

    # ------------------------------------------------------------------ Block /metrics externally
    # Prometheus metrics are intentionally only reachable on loopback
    # (curl http://127.0.0.1:8080/metrics). Block them at the proxy layer.
    location = /metrics {
        return 404;
    }

    # ------------------------------------------------------------------ /healthz (public — uptime monitors)
    location = /healthz {
        proxy_pass         http://127.0.0.1:8080/healthz;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------ MCP endpoint (POST + SSE)
    #
    # MCP Streamable HTTP transport (ADR-0003 §3.1):
    #   POST /mcp  — JSON-RPC request/response
    #   GET  /mcp  — server-sent event stream for async notifications
    #
    # SSE-friendly settings:
    #   proxy_http_version 1.1   — required for chunked transfer (SSE)
    #   proxy_buffering off      — flush SSE events immediately; never buffer them
    #   proxy_read_timeout 15m   — matches MCP_HTTP_SESSION_IDLE_MIN default (ADR-0003 §3.5)
    location /mcp {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE: disable buffering and set a long read timeout.
        proxy_buffering    off;
        proxy_read_timeout 15m;

        # SSE: allow the connection header to be upgraded/cleared.
        proxy_set_header   Connection "";
    }
}
