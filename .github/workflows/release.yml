# release.yml — Cut a release from a semver tag.
#
# Trigger:  push a tag `vX.Y.Z` (e.g. `git tag v0.2.0 && git push origin v0.2.0`).
# Does:     verifies the tag matches package.json, builds + pushes the image
#           tagged with the version, and creates a GitHub Release with notes.
#
# Deploying that image to the VDS is still the manual `deploy.yml` dispatch.

name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      packages: write # push the image to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive and verify version
        id: ver
        env:
          GIT_REF: ${{ github.ref_name }}
        run: |
          TAG="${GIT_REF}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: tag '$TAG' is not a semver vX.Y.Z." >&2
            exit 1
          fi
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$PKG_VERSION" != "$VERSION" ]]; then
            echo "ERROR: tag ($VERSION) does not match package.json ($PKG_VERSION)." >&2
            echo "Bump package.json, commit, then retag." >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push versioned image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tachkovsa/shared-agents-memory:${{ steps.ver.outputs.tag }}
            ghcr.io/tachkovsa/shared-agents-memory:${{ steps.ver.outputs.version }}
          cache-from: type=registry,ref=ghcr.io/tachkovsa/shared-agents-memory:cache-main
          provenance: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
